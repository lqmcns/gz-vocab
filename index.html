<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="高考3500词背单词网页App - 高效记忆，轻松备考">
  <meta name="theme-color" content="#6c5ce7">
  <title> 镐冢词汇 - 高考3500词 - 背单词</title>

  <!-- 全局样式 -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/learn.css">
  <link rel="stylesheet" href="css/spell.css">
  <link rel="stylesheet" href="css/challenge.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Hyphen 库 CDN（英文单词连字符断字） -->
  <script src="https://cdn.jsdelivr.net/npm/hyphen@1.14.1/hyphen.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hyphen@1.14.1/patterns/en-us.min.js"></script>
</head>
<body>

  <!-- ===========================
       顶部导航栏
       =========================== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <!-- 品牌标识 -->
      <div class="navbar-brand">镐冢Vocab</div>

      <!-- 导航链接 -->
      <ul class="navbar-nav">
        <li>
          <a href="#/home" class="active">
            <span class="nav-icon" data-icon="home"></span>
            <span class="nav-text">首页</span>
          </a>
        </li>
        <li>
          <a href="#/learn">
            <span class="nav-icon" data-icon="learn"></span>
            <span class="nav-text">学习</span>
          </a>
        </li>
        <li>
          <a href="#/spell">
            <span class="nav-icon" data-icon="spell"></span>
            <span class="nav-text">拼写</span>
          </a>
        </li>
        <li>
          <a href="#/wordlist">
            <span class="nav-icon" data-icon="wordlist"></span>
            <span class="nav-text">单词表</span>
          </a>
        </li>
        <li>
          <a href="#/learned">
            <span class="nav-icon" data-icon="learned"></span>
            <span class="nav-text">已学</span>
          </a>
        </li>
        <li>
          <a href="#/search">
            <span class="nav-icon" data-icon="search"></span>
            <span class="nav-text">查词</span>
          </a>
        </li>
        <li>
          <a href="#/challenge">
            <span class="nav-icon" data-icon="challenge"></span>
            <span class="nav-text">挑战</span>
          </a>
        </li>
        <li>
          <a href="javascript:void(0)" onclick="toggleSettings()">
            <span class="nav-icon" data-icon="settings"></span>
            <span class="nav-text">设置</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ===========================
       设置面板遮罩
       =========================== -->
  <div class="settings-overlay" id="settings-overlay" onclick="toggleSettings(false)"></div>

  <!-- ===========================
       设置面板（右侧滑出）
       =========================== -->
  <aside class="settings-panel" id="settings-panel">
    <div class="settings-title">
      <span data-icon="settings" style="display:inline-flex;vertical-align:middle;margin-right:0.3rem;"></span> 设置
      <button class="settings-close" onclick="toggleSettings(false)">&times;</button>
    </div>

    <!-- 每批单词数 -->
    <div class="setting-group">
      <div class="setting-label">每批学习数量</div>
      <div class="setting-desc">每次学习新单词的数量</div>
      <div class="setting-control">
        <input type="number" id="setting-batch-size" min="1" max="50" value="5"
          onchange="updateBatchSize(this.value)">
      </div>
    </div>

    <!-- 拼写模式选择 -->
    <div class="setting-group">
      <div class="setting-label">拼写方式</div>
      <div class="setting-desc">学习后自动进入拼写测试的方式（也会用于拼写训练）</div>
      <div class="setting-control">
        <select id="setting-spell-mode" onchange="updateSpellMode(this.value)"
          style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px;
          font-size: 0.9rem; background: var(--bg-primary); color: var(--text-primary);">
          <option value="partial">部分挖空选词（看释义选元音组合）</option>
          <option value="full">完整音节选词（逐个音节选择）</option>
          <option value="manual">手动拼写（看音标释义输入单词）</option>
        </select>
      </div>
    </div>

    <!-- 语音朗读速度 -->
    <div class="setting-group">
      <div class="setting-label">语音朗读速度</div>
      <div class="setting-desc">单词发音播放速度（0.5 - 2.0）</div>
      <div class="setting-control">
        <input type="range" id="setting-voice-rate" min="0.5" max="2.0" step="0.1" value="0.85"
          oninput="updateVoiceRate(this.value)">
        <span class="text-muted" style="font-size: 0.8rem;" id="voice-rate-display">0.85x</span>
      </div>
    </div>

    <!-- 暗色模式开关 -->
    <div class="setting-group">
      <div class="setting-label">暗色模式</div>
      <div class="setting-desc">切换暗色/亮色主题</div>
      <div class="setting-control flex-between">
        <label class="toggle-switch">
          <input type="checkbox" id="setting-dark-mode" onchange="toggleDarkMode()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 清除数据 -->
    <div class="setting-group" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
      <div class="setting-label text-danger">数据管理</div>
      <div class="setting-desc">
        清除进度：删除所有学习记录，单词回到未学习状态<br>
        清除缓存：删除AI生成的例句缓存（不影响学习进度，下次使用会重新生成）
      </div>
      <div class="flex gap-1" style="margin-top: 0.5rem;">
        <button class="btn btn-danger btn-sm" onclick="confirmClearProgress()">清除进度</button>
        <button class="btn btn-secondary btn-sm" onclick="confirmClearCache()">清除缓存</button>
      </div>
    </div>
  </aside>

  <!-- ===========================
       主内容区域
       =========================== -->
  <main class="main-content">

    <!-- 首页 section -->
    <section id="home" class="section active">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 学习 section -->
    <section id="learn" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 拼写训练 section -->
    <section id="spell" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 单词表 section -->
    <section id="wordlist" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 已学 section -->
    <section id="learned" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 查词 section -->
    <section id="search" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 改错挑战 section -->
    <section id="challenge" class="section">
      <!-- 由 app.js 动态渲染 -->
    </section>

  </main>

  <!-- ===========================
       JavaScript 模块加载
       按依赖顺序引入：工具函数 -> 存储层 -> 词库 -> 功能模块 -> 主控制器
       =========================== -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/word-data.js"></script>
  <script src="js/textbook-service.js"></script>
  <script src="js/syllable.js"></script>
  <script src="js/similar-sounds.js"></script>
  <script src="js/ai-service.js"></script>
  <script src="js/spell-module.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
